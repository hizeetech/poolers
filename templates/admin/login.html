{% extends "admin/login.html" %}
{% load i18n %}

{% block content %}
    {{ block.super }}
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.querySelector('form[action]');
            if (!form) return;

            const passwordInput = form.querySelector('input[name="password"]');
            if (!passwordInput) return;

            if (form.querySelector('#showPasswordToggleAdmin')) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'form-check mt-2 mb-3';
            wrapper.innerHTML = `
                <input class="form-check-input" type="checkbox" id="showPasswordToggleAdmin">
                <label class="form-check-label small" for="showPasswordToggleAdmin">{% trans "Show password" %}</label>
            `;

            const inputGroup = passwordInput.closest('.input-group') || passwordInput.parentElement;
            if (inputGroup && inputGroup.parentElement) {
                inputGroup.parentElement.insertBefore(wrapper, inputGroup.nextSibling);
            } else {
                form.appendChild(wrapper);
            }

            const toggle = wrapper.querySelector('#showPasswordToggleAdmin');
            toggle.addEventListener('change', function () {
                passwordInput.type = toggle.checked ? 'text' : 'password';
            });
        });
    </script>
{% endblock %}
