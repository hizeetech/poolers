{% extends 'betting/base.html' %}
{% block title %}{{ page.title }}{% endblock %}
{% block content %}
<div class="app-page">
    <div class="container py-5 position-relative">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="card app-glass-card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 fw-bold mb-4">{{ page.title }}</h1>
                        <div class="ck-content">
                            {{ page.content|safe }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
