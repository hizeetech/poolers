{% extends "admin/change_list.html" %}

{% block extrahead %}
{{ block.super }}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const body = document.body;
    const changelist = document.getElementById('changelist');
    const changelistForm = document.getElementById('changelist-form');
    const POLL_INTERVAL_MS = 15000;
    if (!changelist) {
        return;
    }

    let refreshInFlight = false;
    let refreshQueued = false;
    let socket = null;
    let reconnectTimer = null;
    let pollTimer = null;

    function hasActiveSelection() {
        return document.querySelector('#changelist-form input.action-select:checked') !== null;
    }

    function hasUnsafeFocus() {
        const activeElement = document.activeElement;
        return !!(
            activeElement &&
            activeElement !== document.body &&
            activeElement.matches &&
            activeElement.matches('#toolbar input, #toolbar select, #toolbar textarea, #changelist-form input, #changelist-form select, #changelist-form textarea, .actions select')
        );
    }

    function hasPendingEdits() {
        return !!(
            changelistForm &&
            changelistForm.dataset.liveRefreshDirty === 'true'
        );
    }

    function replaceFromSnapshot(snapshotDoc, selector) {
        const currentNode = document.querySelector(selector);
        const nextNode = snapshotDoc.querySelector(selector);
        if (currentNode && nextNode) {
            currentNode.replaceWith(nextNode);
        }
    }

    async function refreshUserWithdrawalList() {
        if (refreshInFlight) {
            refreshQueued = true;
            return;
        }

        if (document.hidden || hasActiveSelection() || hasUnsafeFocus() || hasPendingEdits()) {
            refreshQueued = true;
            return;
        }

        refreshInFlight = true;
        refreshQueued = false;
        body.dataset.liveRefreshState = 'loading';

        try {
            const url = new URL(window.location.href);
            url.searchParams.set('_live_refresh', String(Date.now()));
            const response = await fetch(url.toString(), {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Accept': 'text/html'
                },
                credentials: 'same-origin',
                cache: 'no-store'
            });

            if (!response.ok) {
                throw new Error('Unable to refresh admin withdrawals.');
            }

            const html = await response.text();
            const snapshotDoc = new DOMParser().parseFromString(html, 'text/html');
            replaceFromSnapshot(snapshotDoc, '#result_list');
            replaceFromSnapshot(snapshotDoc, '#toolbar');
            replaceFromSnapshot(snapshotDoc, '.paginator');
            replaceFromSnapshot(snapshotDoc, '.actions');
            body.dataset.liveRefreshState = 'idle';
        } catch (error) {
            body.dataset.liveRefreshState = 'error';
        } finally {
            refreshInFlight = false;
            if (refreshQueued) {
                window.setTimeout(refreshUserWithdrawalList, 250);
            }
        }
    }

    function scheduleRefresh() {
        if (refreshQueued || refreshInFlight) {
            refreshQueued = true;
            return;
        }
        refreshQueued = true;
        window.setTimeout(refreshUserWithdrawalList, 250);
    }

    function connectSocket() {
        if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
            return;
        }

        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        socket = new WebSocket(protocol + window.location.host + '/ws/admin/userwithdrawal/');

        socket.addEventListener('open', function () {
            body.dataset.liveRefreshTransport = 'websocket';
            if (reconnectTimer) {
                window.clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
        });

        socket.addEventListener('message', function (event) {
            try {
                const data = JSON.parse(event.data || '{}');
                if (data.type === 'admin_userwithdrawal_refresh') {
                    scheduleRefresh();
                }
            } catch (error) {
                body.dataset.liveRefreshState = 'error';
            }
        });

        socket.addEventListener('close', function () {
            body.dataset.liveRefreshTransport = 'disconnected';
            reconnectTimer = window.setTimeout(connectSocket, 3000);
        });

        socket.addEventListener('error', function () {
            body.dataset.liveRefreshTransport = 'error';
            if (socket) {
                socket.close();
            }
        });
    }

    function startPolling() {
        if (pollTimer) {
            return;
        }
        body.dataset.liveRefreshPolling = 'enabled';
        pollTimer = window.setInterval(function () {
            if (!document.hidden) {
                scheduleRefresh();
            }
        }, POLL_INTERVAL_MS);
    }

    function stopPolling() {
        if (!pollTimer) {
            return;
        }
        window.clearInterval(pollTimer);
        pollTimer = null;
        body.dataset.liveRefreshPolling = 'disabled';
    }

    if (changelistForm) {
        changelistForm.addEventListener('change', function (event) {
            const target = event.target;
            if (!target || !target.matches) {
                return;
            }
            if (target.matches('input.action-select, input.select-across')) {
                return;
            }
            changelistForm.dataset.liveRefreshDirty = 'true';
        });

        changelistForm.addEventListener('submit', function () {
            changelistForm.dataset.liveRefreshDirty = 'false';
        });
    }

    document.addEventListener('visibilitychange', function () {
        if (!document.hidden && refreshQueued) {
            refreshUserWithdrawalList();
        }
    });

    window.addEventListener('beforeunload', function () {
        stopPolling();
        if (socket) {
            socket.close();
        }
    });

    startPolling();
    connectSocket();
});
</script>
{% endblock %}
