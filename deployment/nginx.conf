upstream shop_app {
    server unix:/run/shop/shop.sock;
}

server {
    listen 80;
    server_name shop.stakenaija.ng www.shop.stakenaija.ng;

    location /.well-known/acme-challenge/ {
        root /var/www/shop;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name shop.stakenaija.ng www.shop.stakenaija.ng;

    ssl_certificate /etc/letsencrypt/live/shop.stakenaija.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.stakenaija.ng/privkey.pem;

    location /static/ {
        alias /var/www/shop/staticfiles/;
    }

    location /media/ {
        alias /var/www/shop/mediafiles/;
    }

    location / {
        proxy_pass http://shop_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
